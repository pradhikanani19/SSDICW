<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Render App</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#6a11cb,#2575fc);
color:white;
}

.container{
text-align:center;
background:rgba(0,0,0,0.25);
padding:50px 60px;
border-radius:18px;
backdrop-filter:blur(12px);
box-shadow:0 10px 35px rgba(0,0,0,0.3);
max-width:450px;
}

h1{
font-size:42px;
margin-bottom:12px;
letter-spacing:1px;
}

p{
font-size:18px;
opacity:0.9;
margin-bottom:25px;
}

button{
padding:14px 28px;
border:none;
border-radius:10px;
background:white;
color:#2575fc;
font-weight:bold;
font-size:15px;
cursor:pointer;
transition:all 0.25s ease;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button:hover{
transform:translateY(-3px) scale(1.05);
box-shadow:0 8px 20px rgba(0,0,0,0.35);
}

button:active{
transform:scale(0.98);
}

.footer{
margin-top:25px;
font-size:13px;
opacity:0.7;
}

</style>
</head>

<body>

<div class="container">

<h1>🚀 Hello from Render</h1>
<p>Your website is successfully deployed!</p>

<button onclick="alert('It works! 🎉')">
Click Me
</button>

<div class="footer">
Powered by Render
</div>

</div>

</body>
</html>
