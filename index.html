<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Two Sample T-Test App</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#6a11cb,#2575fc);
color:white;
}

.container{
text-align:center;
background:rgba(0,0,0,0.25);
padding:50px 60px;
border-radius:18px;
backdrop-filter:blur(12px);
box-shadow:0 10px 35px rgba(0,0,0,0.3);
max-width:450px;
width:100%;
}

h1{
font-size:36px;
margin-bottom:12px;
letter-spacing:1px;
}

p{
font-size:16px;
opacity:0.9;
margin-bottom:15px;
}

input, select{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
font-size:14px;
}

button{
padding:14px 28px;
border:none;
border-radius:10px;
background:white;
color:#2575fc;
font-weight:bold;
font-size:15px;
cursor:pointer;
transition:all 0.25s ease;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
width:100%;
margin-top:10px;
}

button:hover{
transform:translateY(-3px) scale(1.05);
box-shadow:0 8px 20px rgba(0,0,0,0.35);
}

button:active{
transform:scale(0.98);
}

.result{
margin-top:18px;
padding:12px;
background:rgba(255,255,255,0.15);
border-radius:8px;
font-size:16px;
}

.footer{
margin-top:20px;
font-size:13px;
opacity:0.7;
}

</style>

</head>

<body>

<div class="container">

<h1>📊 Two Sample T-Test</h1>
<p>Enter numbers separated by commas</p>

<input id="sample1" placeholder="Sample 1 (e.g. 10,12,14,16)">
<input id="sample2" placeholder="Sample 2 (e.g. 9,11,13,15)">

<select id="alternative">
<option value="two-sided">Two-Sided Test</option>
<option value="left">Left-Tailed Test</option>
<option value="right">Right-Tailed Test</option>
</select>

<button onclick="runTest()">Run T-Test</button>

<div class="result" id="result">
Enter values and click Run T-Test
</div>

<div class="footer">
Powered by Python • NumPy • SciPy • Flask
</div>

</div>

<script>

async function runTest(){

let s1=document.getElementById("sample1").value.split(",").map(Number)
let s2=document.getElementById("sample2").value.split(",").map(Number)
let alt=document.getElementById("alternative").value

if(!s1.length || !s2.length){
document.getElementById("result").innerHTML="Please enter both samples."
return
}

let response=await fetch("/calculate",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
sample1:s1,
sample2:s2,
alternative:alt
})
})

let result=await response.json()

document.getElementById("result").innerHTML=
"T-value: "+result.t_calculated.toFixed(4)+"<br>"+
"P-value: "+result.p_value.toFixed(4)

}

</script>

</body>
</html>
