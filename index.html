<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Two Sample T-Test Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}

body{
background:#f5f7fb;
color:#333;
}

/* HEADER */

.header{
background:white;
padding:20px 40px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
font-size:20px;
font-weight:600;
}

/* MAIN LAYOUT */

.main{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
padding:40px;
height:calc(100vh - 70px);
}

/* PANELS */

.panel{
background:white;
border-radius:10px;
padding:30px;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
display:flex;
flex-direction:column;
}

.panel h2{
margin-bottom:20px;
font-size:18px;
}

/* INPUTS */

label{
font-size:13px;
font-weight:600;
margin-bottom:5px;
margin-top:15px;
}

input,select{
width:100%;
padding:10px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
}

input:focus,select:focus{
outline:none;
border-color:#4f46e5;
}

/* BUTTON */

button{
margin-top:25px;
padding:12px;
border:none;
background:#4f46e5;
color:white;
font-weight:600;
border-radius:6px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#4338ca;
}

/* RESULTS */

.result-box{
background:#f8f9fc;
padding:20px;
border-radius:8px;
margin-top:20px;
font-size:15px;
line-height:1.8;
}

.metric{
font-size:22px;
font-weight:600;
margin-top:10px;
}

.decision{
margin-top:15px;
padding:12px;
border-radius:6px;
background:#eef2ff;
font-weight:600;
}

/* FOOTER */

.footer{
text-align:center;
padding:10px;
font-size:12px;
color:#888;
}

</style>

</head>

<body>

<div class="header">
Two Sample T-Test Analysis Dashboard
</div>

<div class="main">

<!-- INPUT PANEL -->

<div class="panel">

<h2>Input Data</h2>

<label>Sample 1</label> <input id="sample1" placeholder="Example: 10,12,14,16">

<label>Sample 2</label> <input id="sample2" placeholder="Example: 9,11,13,15">

<label>Alternative Hypothesis</label> <select id="alternative">

<option value="two-sided">Two-Sided Test</option>
<option value="left">Left-Tailed Test</option>
<option value="right">Right-Tailed Test</option>
</select>

<button onclick="runTest()">Run Statistical Test</button>

</div>

<!-- RESULTS PANEL -->

<div class="panel">

<h2>Analysis Results</h2>

<div class="result-box" id="result">

Run the test to see results

</div>

</div>

</div>

<div class="footer">
Powered by Python • NumPy • SciPy • Flask
</div>

<script>

async function runTest(){

let s1=document.getElementById("sample1").value.split(",").map(Number)
let s2=document.getElementById("sample2").value.split(",").map(Number)
let alt=document.getElementById("alternative").value

if(!s1.length || !s2.length){
document.getElementById("result").innerHTML="Please enter both samples."
return
}

let response=await fetch("/calculate",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
sample1:s1,
sample2:s2,
alternative:alt
})
})

let result=await response.json()

let decision=""
let alpha=0.05

if(result.p_value < alpha){
decision="Reject the Null Hypothesis (Significant Difference)"
}
else{
decision="Fail to Reject the Null Hypothesis"
}

document.getElementById("result").innerHTML=
"<div>T Statistic</div>"+
"<div class='metric'>"+result.t_calculated.toFixed(4)+"</div>"+

"<div style='margin-top:15px'>P Value</div>"+
"<div class='metric'>"+result.p_value.toFixed(4)+"</div>"+

"<div class='decision'>Decision: "+decision+"</div>"

}

</script>

</body>
</html>
