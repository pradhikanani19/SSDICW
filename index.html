<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Two Sample T-Test Calculator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}

body{
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#333;
}

.container{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
width:420px;
}

h1{
font-size:22px;
margin-bottom:8px;
font-weight:600;
}

.subtitle{
font-size:14px;
color:#666;
margin-bottom:25px;
}

label{
font-size:13px;
font-weight:600;
color:#444;
display:block;
margin-bottom:5px;
margin-top:12px;
}

input,select{
width:100%;
padding:10px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
transition:0.2s;
}

input:focus,select:focus{
outline:none;
border-color:#4f46e5;
}

button{
width:100%;
margin-top:20px;
padding:12px;
border:none;
background:#4f46e5;
color:white;
border-radius:6px;
font-weight:600;
font-size:14px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#4338ca;
}

.result{
margin-top:20px;
padding:18px;
background:#f7f8fb;
border-radius:6px;
font-size:14px;
line-height:1.7;
}

.decision{
margin-top:10px;
font-weight:600;
}

.footer{
text-align:center;
font-size:12px;
margin-top:18px;
color:#888;
}

</style>

</head>

<body>

<div class="container">

<h1>Two Sample T-Test</h1>
<p class="subtitle">Compare whether two datasets have significantly different means</p>

<label>Sample 1</label> <input id="sample1" placeholder="Example: 10,12,14,16">

<label>Sample 2</label> <input id="sample2" placeholder="Example: 9,11,13,15">

<label>Alternative Hypothesis</label> <select id="alternative">

<option value="two-sided">Two-Sided Test</option>
<option value="left">Left-Tailed Test</option>
<option value="right">Right-Tailed Test</option>
</select>

<button onclick="runTest()">Run T-Test</button>

<div class="result" id="result">
Enter values and click Run T-Test
</div>

<div class="footer">
Two Sample T-Test • Python • NumPy • SciPy
</div>

</div>

<script>

async function runTest(){

let s1=document.getElementById("sample1").value.split(",").map(Number)
let s2=document.getElementById("sample2").value.split(",").map(Number)
let alt=document.getElementById("alternative").value

if(!s1.length || !s2.length){
document.getElementById("result").innerHTML="Please enter both samples."
return
}

let response=await fetch("/calculate",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
sample1:s1,
sample2:s2,
alternative:alt
})
})

let result=await response.json()

let decision=""
let alpha=0.05

if(result.p_value < alpha){
decision="Reject the Null Hypothesis (significant difference)"
}
else{
decision="Fail to Reject the Null Hypothesis"
}

document.getElementById("result").innerHTML=
"<strong>T Statistic:</strong> "+result.t_calculated.toFixed(4)+"<br>"+
"<strong>P Value:</strong> "+result.p_value.toFixed(4)+"<br>"+
"<div class='decision'>Decision: "+decision+"</div>"

}

</script>

</body>
</html>
